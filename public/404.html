<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecionando...</title>
    <script>
      // Redireciona para index.html preservando o caminho da rota
      const segmentCount = 1; // Como o base path é /Kachat/, o primeiro segmento é o nome do repo
      const l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/Kachat/' + l.pathname.slice(l.pathname.indexOf('/', 1) + 1) +
        l.search + l.hash
      );
    </script>
  </head>
  <body>
    Redirecionando...
  </body>
</html>
